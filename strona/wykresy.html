<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wykresy poziomu hałasu w Warszawie. Porównanie danych z czujników w czasie - Lmax i Leq. Projekt Miasto Jest Nasze.">
    <link rel="icon" href="favicon.ico">
    <title>Wykresy Hałasu MJN</title>
    <!-- Chart.js with time scale adapter -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <!-- Add Figtree font -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Common styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Sensor configuration -->
    <script src="sensors.js"></script>
    <!-- Shared chart utilities -->
    <script src="charts-config.js"></script>
</head>

<body>
    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="static.html">Mapa</a>
        <a href="wykresy.html" class="active">Wykresy</a>
        <a href="halas/index.html">Hałas</a>
        <!-- Logo on the right side -->
        <div class="navbar-logo">
            <a href="https://miastojestnasze.org/" target="_blank" rel="noopener noreferrer">
                <img src="logo.png" alt="Logo">
            </a>
        </div>
    </div>

    <div class="charts-layout">
        <div class="container">
        <!-- Controls -->
        <div class="controls">
            <div>
                <label for="timeRange">Zakres czasowy:</label>
                <select id="timeRange">
                    <option value="24">Ostatnie 24 godziny</option>
                    <option value="168">Ostatni tydzień</option>
                    <option value="720">Ostatni miesiąc</option>
                </select>

                <label for="metricType" class="metric-label">Metryka:</label>
                <select id="metricType">
                    <option value="Lmax">Lmax (poziom maksymalny)</option>
                    <option value="Leq">Leq (poziom równoważny)</option>
                </select>

                <button id="refreshButton" class="refresh-button">Odśwież dane</button>
                <button id="uncheckAllButton" class="refresh-button secondary">Odznacz wszystkie</button>
            </div>

            <div class="sensor-controls">
                <h4>Wybierz czujniki do wyświetlenia:</h4>
                <div class="sensor-checkboxes" id="sensorCheckboxes">
                    <!-- Checkboxes will be populated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stats-grid" id="statsGrid">
            <!-- Stats will be populated by JavaScript -->
        </div>

        <!-- Loading indicator -->
        <div id="loading" class="loading-indicator">
            <h3>Ładowanie danych...</h3>
            <p>Pobieranie danych z sensorów...</p>
        </div>

        <!-- Error message -->
        <div id="error" class="error-message">
            <h3>Błąd ładowania danych</h3>
            <p>Wystąpił problem podczas pobierania danych z serwera.</p>
        </div>

        <!-- Charts Grid (instantaneous) -->
        <div class="charts-grid" id="chartsGrid" style="display: none;">
            <!-- Charts will be populated by JavaScript -->
        </div>

        <!-- Daily chart section -->
        <div class="controls" style="margin-top: 30px;">
            <div>
                <h4 style="margin: 0 0 10px 0;">Wskaźniki dobowe</h4>
                <label for="dailyMetricType">Metryka dobowa:</label>
                <select id="dailyMetricType">
                    <option value="LeqDoba">LeqDoba (06-06, cała doba)</option>
                    <option value="LeqDzien">LeqDzień (06-22, dzień)</option>
                    <option value="LeqNoc">LeqNoc (22-06, noc)</option>
                </select>
            </div>
        </div>

        <div id="dailyLoading" class="loading-indicator" style="display: none;">
            <h3>Ładowanie danych dobowych...</h3>
        </div>

        <div class="charts-grid" id="dailyChartsGrid" style="display: none;">
            <!-- Daily chart will be populated by JavaScript -->
        </div>
    </div>

    <script>
        let allSensorData = [];
        let allDailyData = [];
        let combinedChart = null; // Chart.js instance for instantaneous data
        let dailyChart = null;    // Chart.js instance for daily data
        let activeDatasets = new Set();
        let availableSensors = new Set();
        let sensorIdToIndex = {};

        // Fetch sensor data from the server
        function fetchData() {
            return fetch(buildApiUrl())
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    allSensorData = data;
                    return data;
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    throw error;
                });
        }

        function fetchDailyData() {
            return fetch(buildDailyUrl())
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    allDailyData = data;
                    return data;
                })
                .catch(error => {
                    console.error('Error fetching daily data:', error);
                    throw error;
                });
        }

        // Calculate statistics
        function calculateStats(data) {
            if (data.length === 0) return {};
            const metricType = document.getElementById('metricType').value;
            const noiseLevels = data.map(reading => {
                return metricType === 'Leq' ? (reading.Leq || 0) : (reading.Lmax || reading.loudness || 0);
            });
            const validLevels = noiseLevels.filter(level => level > 0);
            if (validLevels.length === 0) return {};
            return {
                average: (validLevels.reduce((sum, l) => sum + l, 0) / validLevels.length).toFixed(1),
                maximum: Math.max(...validLevels).toFixed(1),
                minimum: Math.min(...validLevels).toFixed(1),
                readings: validLevels.length
            };
        }

        // Display statistics
        function displayStats(groupedData) {
            const statsGrid = document.getElementById('statsGrid');
            let allReadings = [];
            Object.values(groupedData).forEach(sensorData => {
                allReadings = allReadings.concat(sensorData);
            });
            const overallStats = calculateStats(allReadings);
            const activeSensors = Object.keys(groupedData).length;
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${activeSensors}</div>
                    <div class="stat-label">Aktywne sensory</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${overallStats.readings || 0}</div>
                    <div class="stat-label">Łączna liczba pomiarów</div>
                </div>
            `;
        }

        // Create sensor checkboxes
        function createSensorCheckboxes(groupedData) {
            const checkboxContainer = document.getElementById('sensorCheckboxes');
            checkboxContainer.innerHTML = '';
            availableSensors.clear();
            Object.keys(groupedData).forEach(sensorId => {
                if (groupedData[sensorId].length > 0) {
                    availableSensors.add(sensorId);
                }
            });
            let colorIndex = 0;
            availableSensors.forEach(sensorId => {
                const sensorName = sensorNames[sensorId] ? sensorNames[sensorId].adres : sensorId;
                const color = sensorColors[colorIndex % sensorColors.length];
                const checkboxDiv = document.createElement('div');
                checkboxDiv.className = 'sensor-checkbox';
                const isChecked = activeDatasets.has(sensorId) ? 'checked' : '';
                checkboxDiv.innerHTML = `
                    <input type="checkbox" id="sensor-${sensorId}" ${isChecked}
                           onchange="toggleSensorFromCheckbox('${sensorId}')">
                    <label for="sensor-${sensorId}">${sensorName}</label>
                    <div class="sensor-color" style="background-color: ${color};"></div>
                `;
                checkboxContainer.appendChild(checkboxDiv);
                colorIndex++;
            });
        }

        // Toggle sensor from checkbox
        function toggleSensorFromCheckbox(sensorId) {
            const checkbox = document.getElementById(`sensor-${sensorId}`);
            if (checkbox.checked) {
                activeDatasets.add(sensorId);
            } else {
                activeDatasets.delete(sensorId);
            }
            updateChartVisibility();
        }

        // Uncheck all sensors
        function uncheckAllSensors() {
            activeDatasets.clear();
            availableSensors.forEach(sensorId => {
                const checkbox = document.getElementById(`sensor-${sensorId}`);
                if (checkbox) checkbox.checked = false;
            });
            updateChartVisibility();
        }

        // Update chart visibility based on active datasets
        function updateChartVisibility() {
            if (combinedChart) {
                combinedChart.data.datasets.forEach(dataset => {
                    dataset.hidden = !activeDatasets.has(dataset.sensorId);
                });
                combinedChart.update();
            }
            if (dailyChart) {
                dailyChart.data.datasets.forEach(dataset => {
                    dataset.hidden = !activeDatasets.has(dataset.sensorId);
                });
                dailyChart.update();
            }
        }

        // Create instantaneous charts
        function createCharts(groupedData) {
            const chartsGrid = document.getElementById('chartsGrid');
            chartsGrid.innerHTML = '';

            activeDatasets.clear();
            Object.keys(groupedData).forEach(sensorId => {
                if (groupedData[sensorId].length > 0) {
                    activeDatasets.add(sensorId);
                }
            });

            createSensorCheckboxes(groupedData);

            const chartContainer = document.createElement('div');
            chartContainer.className = 'chart-container';
            chartContainer.id = 'chart-container';
            chartContainer.innerHTML = `<canvas id="combined-chart"></canvas>`;
            chartsGrid.appendChild(chartContainer);

            setTimeout(() => {
                createChartJsChart(groupedData);
            }, 10);
        }

        // Create Chart.js chart for instantaneous data
        function createChartJsChart(groupedData) {
            if (combinedChart) {
                combinedChart.destroy();
                combinedChart = null;
            }

            const metricType = document.getElementById('metricType').value;
            const datasets = [];
            let colorIndex = 0;
            sensorIdToIndex = {};

            Object.keys(groupedData).forEach(sensorId => {
                const sensorData = groupedData[sensorId];
                if (sensorData.length === 0) return;

                const sensorName = sensorNames[sensorId] ? sensorNames[sensorId].adres : sensorId;
                const color = sensorColors[colorIndex % sensorColors.length];

                const dataPoints = sensorData.map(reading => ({
                    x: new Date(reading.timestamp * 1000),
                    y: metricType === 'Leq' ? (reading.Leq || 0) : (reading.Lmax || reading.loudness || 0)
                }));

                sensorIdToIndex[sensorId] = datasets.length;

                datasets.push(Object.assign({
                    label: sensorName,
                    sensorId: sensorId,
                    data: dataPoints
                }, defaultDatasetStyle(color, { borderWidth: 3, pointHoverRadius: 5, pointHitRadius: 10 })));

                colorIndex++;
            });

            const yAxisLabel = metricType === 'Leq' ? 'Poziom równoważny Leq (dB)' : 'Poziom maksymalny Lmax (dB)';

            const ctx = document.getElementById('combined-chart').getContext('2d');
            combinedChart = new Chart(ctx, {
                type: 'line',
                data: { datasets: datasets },
                options: defaultChartOptions({
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                tooltipFormat: 'dd.MM.yyyy HH:mm',
                                displayFormats: { hour: 'HH:mm', day: 'dd.MM' }
                            },
                            title: { display: true, text: 'Czas', font: { size: 14, weight: 600 } },
                            ticks: { maxTicksLimit: 10 }
                        },
                        y: {
                            suggestedMin: 30,
                            suggestedMax: 80,
                            title: { display: true, text: yAxisLabel, font: { size: 14, weight: 600 } }
                        }
                    },
                    plugins: {
                        legend: {
                            onClick: function(e, legendItem) {
                                const sensorId = combinedChart.data.datasets[legendItem.datasetIndex].sensorId;
                                const checkbox = document.getElementById(`sensor-${sensorId}`);
                                if (activeDatasets.has(sensorId)) {
                                    activeDatasets.delete(sensorId);
                                    if (checkbox) checkbox.checked = false;
                                } else {
                                    activeDatasets.add(sensorId);
                                    if (checkbox) checkbox.checked = true;
                                }
                                updateChartVisibility();
                            }
                        }
                    }
                })
            });
        }

        // Render the daily chart from already-fetched allDailyData
        function renderDailyChart() {
            if (dailyChart) {
                dailyChart.destroy();
                dailyChart = null;
            }

            const dailyGrid = document.getElementById('dailyChartsGrid');
            dailyGrid.innerHTML = '';

            const grouped = groupDailyDataBySensor(allDailyData);
            // Filter to known sensors only
            const knownGrouped = {};
            Object.keys(grouped).forEach(sensorId => {
                if (sensorNames[sensorId] && grouped[sensorId].length > 0) {
                    knownGrouped[sensorId] = grouped[sensorId];
                }
            });

            if (Object.keys(knownGrouped).length === 0) {
                dailyGrid.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">Brak danych dobowych.</p>';
                dailyGrid.style.display = 'grid';
                return;
            }

            const chartContainer = document.createElement('div');
            chartContainer.className = 'chart-container';
            chartContainer.innerHTML = '<canvas id="daily-chart"></canvas>';
            dailyGrid.appendChild(chartContainer);
            dailyGrid.style.display = 'grid';

            const metricType = document.getElementById('dailyMetricType').value;
            const metricLabels = {
                'LeqDzien': 'LeqDzień (06-22)',
                'LeqNoc': 'LeqNoc (22-06)',
                'LeqDoba': 'LeqDoba (06-06)'
            };

            const datasets = [];
            let colorIndex = 0;

            Object.keys(knownGrouped).forEach(sensorId => {
                const sensorData = knownGrouped[sensorId];
                const sensorName = sensorNames[sensorId] ? sensorNames[sensorId].adres : sensorId;
                const color = sensorColors[colorIndex % sensorColors.length];

                const dataPoints = sensorData
                    .filter(record => record[metricType] != null)
                    .map(record => ({
                        x: new Date(record.date + 'T12:00:00'),
                        y: record[metricType]
                    }));

                datasets.push(Object.assign({
                    label: sensorName,
                    sensorId: sensorId,
                    data: dataPoints,
                    hidden: !activeDatasets.has(sensorId)
                }, defaultDatasetStyle(color, { borderWidth: 3, pointRadius: 3, pointHoverRadius: 6, pointHitRadius: 10 })));

                colorIndex++;
            });

            setTimeout(() => {
                const ctx = document.getElementById('daily-chart').getContext('2d');
                dailyChart = new Chart(ctx, {
                    type: 'line',
                    data: { datasets: datasets },
                    options: defaultChartOptions({
                        scales: {
                            x: {
                                type: 'time',
                                time: { unit: 'day', tooltipFormat: 'dd.MM.yyyy', displayFormats: { day: 'dd.MM' } },
                                title: { display: true, text: 'Data', font: { size: 14, weight: 600 } }
                            },
                            y: {
                                suggestedMin: 30,
                                suggestedMax: 80,
                                title: { display: true, text: (metricLabels[metricType] || metricType) + ' (dB)', font: { size: 14, weight: 600 } }
                            }
                        },
                        plugins: {
                            legend: {
                                onClick: function(e, legendItem) {
                                    const sensorId = dailyChart.data.datasets[legendItem.datasetIndex].sensorId;
                                    const checkbox = document.getElementById(`sensor-${sensorId}`);
                                    if (activeDatasets.has(sensorId)) {
                                        activeDatasets.delete(sensorId);
                                        if (checkbox) checkbox.checked = false;
                                    } else {
                                        activeDatasets.add(sensorId);
                                        if (checkbox) checkbox.checked = true;
                                    }
                                    updateChartVisibility();
                                }
                            }
                        }
                    })
                });
            }, 10);
        }

        // Filter grouped data to include only sensors defined in sensorNames
        function filterGroupedDataByKnownSensors(groupedData) {
            const filtered = {};
            Object.keys(groupedData).forEach(sensorId => {
                if (Object.prototype.hasOwnProperty.call(sensorNames, sensorId) && groupedData[sensorId] && groupedData[sensorId].length > 0) {
                    filtered[sensorId] = groupedData[sensorId];
                }
            });
            return filtered;
        }

        // Main function to load and display data
        function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('chartsGrid').style.display = 'none';
            document.getElementById('dailyLoading').style.display = 'block';
            document.getElementById('dailyChartsGrid').style.display = 'none';

            Promise.all([fetchData(), fetchDailyData()])
                .then(([data]) => {
                    const timeRange = parseInt(document.getElementById('timeRange').value);
                    const filteredData = filterDataByTimeRange(data, timeRange);
                    const groupedData = groupDataBySensor(filteredData);
                    const knownGroupedData = filterGroupedDataByKnownSensors(groupedData);

                    displayStats(knownGroupedData);
                    createCharts(knownGroupedData);

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('chartsGrid').style.display = 'grid';

                    // Render daily chart
                    document.getElementById('dailyLoading').style.display = 'none';
                    renderDailyChart();
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dailyLoading').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                });
        }

        // Event listeners
        document.getElementById('timeRange').addEventListener('change', loadData);
        document.getElementById('metricType').addEventListener('change', loadData);
        document.getElementById('refreshButton').addEventListener('click', loadData);
        document.getElementById('uncheckAllButton').addEventListener('click', uncheckAllSensors);
        document.getElementById('dailyMetricType').addEventListener('change', renderDailyChart);

        // Initial load
        loadData();

        // Auto-refresh every 3 minutes
        setInterval(loadData, 180000);
    </script>
    </div>
</body>

</html>
