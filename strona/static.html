<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Hałasu MJN</title>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.css" />
    <!-- Add Chart.js for the popup charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Add Figtree font -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Common styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Sensor configuration -->
    <script src="sensors.js"></script>

</head>

<body>
    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="static.html" class="active">Mapa</a>
        <a href="omapie.html">O mapie</a>
        <a href="wykresy.html">Wykresy</a>
        <!-- Logo on the right side -->
        <div class="navbar-logo">
            <a href="https://miastojestnasze.org/" target="_blank" rel="noopener noreferrer">
                <img src="logo.png" alt="Logo">
            </a>
        </div>
    </div>

    <div class="map-layout">
        <div id="map"></div>
        <div id="loading" class="loading-indicator">Ładowanie danych...</div>
    </div>

    <script>

        // Global variables
        let sensorMarkers = []; // Store references to all sensor markers

        // Initialize the map centered on Warsaw
        const map = L.map('map').setView([52.229676, 21.012229], 12);

        // Add OpenStreetMap tile layer
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Function to determine circle color based on noise value
        function getColor(noiseValue) {
            return noiseValue > 65 ? '#ff0000' :
                noiseValue > 60 ? '#ff2600' :
                    noiseValue > 55 ? '#FF552B' :
                        noiseValue > 50 ? '#DF8A09' :
                            noiseValue > 45 ? '#BF9E00' :
                                '#9F9F00';
        }

        // Function to determine circle radius based on noise value
        function getRadius(noiseValue) {
            return noiseValue * 0.5; // Reduced from 0.8 to 0.5 to make circles smaller
        }

        // Create info panel
        const info = L.control();

        info.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info-panel');
            this.update();
            return this._div;
        };

        info.update = function (props) {
            this._div.innerHTML = `
                <h4>Mapa Hałasu MJN</h4>
                <img src="syrenka_halas.png" alt="Syrenka Hałasu" style="max-width: 100%; max-height: 100px; margin-top: 10px;">
            `;
            // Removed the hover text - now only showing the title and image
        };

        info.addTo(map);

        // Create legend
        const legend = L.control({ position: 'bottomright' });

        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            const grades = [0, 45, 50, 55, 60, 65];

            div.innerHTML = '<h4>Poziom Hałasu (dB)</h4>';

            // Loop through our density intervals and generate a label with a colored square for each interval
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                    grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
            }

            // Add gray for inactive sensors - positioned on a new line below the 65+ entry
            div.innerHTML += '<br><i style="background:#888888"></i> Brak danych w 24h<br>';

            return div;
        };

        legend.addTo(map);

        // Show loading indicator
        document.getElementById('loading').style.display = 'block';

        // Store all sensor data globally for chart creation
        let allSensorData = [];

        // Function to create a chart showing noise level changes over time
        function createNoiseChart(sensorId, canvasId, metricType = 'Lmax') {
            // Get the last 24 hours of data for this sensor
            const currentTimestamp = Math.floor(Date.now() / 1000);
            const oneDayAgo = currentTimestamp - 86400;

            // Filter data for this sensor and for the last 24 hours
            let sensorData = allSensorData.filter(reading => {
                return reading.id === sensorId && reading.timestamp >= oneDayAgo;
            });

            // Sort by timestamp
            sensorData.sort((a, b) => a.timestamp - b.timestamp);

            // If there's no data, show a message
            if (sensorData.length === 0) {
                document.getElementById(canvasId).style.display = 'none';
                const container = document.getElementById(canvasId).parentNode;
                const noDataMsg = document.createElement('p');
                noDataMsg.textContent = 'Brak danych z ostatnich 24 godzin.';
                noDataMsg.style.textAlign = 'center';
                noDataMsg.style.fontStyle = 'italic';
                noDataMsg.style.color = '#888';
                container.appendChild(noDataMsg);
                return;
            }

            // Prepare data points for chart
            const labels = sensorData.map(reading => {
                const date = new Date(reading.timestamp * 1000);
                return date.getHours() + ':' + (date.getMinutes() < 10 ? '0' : '') + date.getMinutes();
            });

            const noiseLevels = sensorData.map(reading => {
                if (metricType === 'Leq') {
                    return reading.Leq || 0;
                } else {
                    return reading.Lmax || reading.loudness || 0;
                }
            });

            // Create the chart
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Poziom hałasu ${metricType} (dB)`,
                        data: noiseLevels,
                        backgroundColor: 'rgba(161, 143, 250, 0.2)', // Changed to #a18ffa with opacity
                        borderColor: '#a18ffa', // Changed to #a18ffa
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0, // Remove point circles
                        pointHoverRadius: 6, // Show points only on hover
                        pointHoverBackgroundColor: 'rgba(75, 192, 192, 1)',
                        pointHitRadius: 10 // Larger area for hover detection
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: Math.max(0, Math.min(...noiseLevels) - 5),
                            title: {
                                display: true,
                                text: 'dB'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Godzina'
                            },
                            ticks: {
                                maxRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 8 // Limit the number of x-axis labels
                            }
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: `Poziom hałasu ${metricType} w ostatnich 24 godzinach`
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        },
                        legend: {
                            display: false // Hide legend since there's only one dataset
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        // Function to create a combined chart with both Lmax and Leq lines
        function createCombinedNoiseChart(sensorId, canvasId) {
            // Get the last 24 hours of data for this sensor
            const currentTimestamp = Math.floor(Date.now() / 1000);
            const oneDayAgo = currentTimestamp - 86400;

            // Filter data for this sensor and for the last 24 hours
            let sensorData = allSensorData.filter(reading => {
                return reading.id === sensorId && reading.timestamp >= oneDayAgo;
            });

            // Sort by timestamp
            sensorData.sort((a, b) => a.timestamp - b.timestamp);

            // If there's no data, show a message
            if (sensorData.length === 0) {
                document.getElementById(canvasId).style.display = 'none';
                const container = document.getElementById(canvasId).parentNode;
                const noDataMsg = document.createElement('p');
                noDataMsg.textContent = 'Brak danych z ostatnich 24 godzin.';
                noDataMsg.style.textAlign = 'center';
                noDataMsg.style.fontStyle = 'italic';
                noDataMsg.style.color = '#888';
                container.appendChild(noDataMsg);
                return;
            }

            // Prepare data points for chart
            const labels = sensorData.map(reading => {
                const date = new Date(reading.timestamp * 1000);
                return date.getHours() + ':' + (date.getMinutes() < 10 ? '0' : '') + date.getMinutes();
            });

            const lmaxLevels = sensorData.map(reading => reading.Lmax || reading.loudness || 0);
            const leqLevels = sensorData.map(reading => reading.Leq || 0);

            // Create the chart
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Lmax (dB)',
                            data: lmaxLevels,
                            backgroundColor: 'rgba(255, 107, 107, 0.2)',
                            borderColor: '#ff6b6b',
                            borderWidth: 2,
                            fill: false,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            pointHoverBackgroundColor: '#ff6b6b',
                            pointHitRadius: 8
                        },
                        {
                            label: 'Leq (dB)',
                            data: leqLevels,
                            backgroundColor: 'rgba(161, 143, 250, 0.2)',
                            borderColor: '#a18ffa',
                            borderWidth: 2,
                            fill: false,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            pointHoverBackgroundColor: '#a18ffa',
                            pointHitRadius: 8
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: Math.max(0, Math.min(...lmaxLevels.concat(leqLevels)) - 5),
                            title: {
                                display: true,
                                text: 'dB'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Godzina'
                            },
                            ticks: {
                                maxRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 8
                            }
                        }
                    },
                    plugins: {
                        title: {
                            display: false
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        },
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        function fetchData() {
            // Clear sensor markers array
            sensorMarkers = [];

            // Mapa potrzebuje max 48h danych (~5000 rekordów)
            fetch(buildApiUrl({ limit: 5000 }))
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    // Hide loading indicator
                    document.getElementById('loading').style.display = 'none';

                    // Store all data globally
                    allSensorData = data;

                    // Create a map to store the latest reading for each sensor
                    const latestSensorData = new Map();

                    // Process all data to find the latest reading for each sensor
                    data.forEach(sensor => {
                        const sensorId = sensor.id;
                        const timestamp = sensor.timestamp || 0;

                        // If we haven't seen this sensor before, or if this reading is newer
                        if (!latestSensorData.has(sensorId) ||
                            timestamp > latestSensorData.get(sensorId).timestamp) {
                            latestSensorData.set(sensorId, sensor);
                        }
                    });

                    // Get current timestamp in seconds
                    const currentTimestamp = Math.floor(Date.now() / 1000);
                    // 24 hours in seconds = 86400
                    const oneDayInSeconds = 86400;

                    // Add circle markers only for the latest reading of each sensor
                    latestSensorData.forEach(sensor => {
                        // Check if sensor has location data, otherwise use predefined locations for known sensors
                        let latitude, longitude;
                        if (sensor.location && sensor.location.latitude && sensor.location.longitude) {
                            latitude = sensor.location.latitude;
                            longitude = sensor.location.longitude;
                        } else if (sensorNames[sensor.id]) {
                            // Use coordinates from the sensorNames object
                            latitude = sensorNames[sensor.id].latitude;
                            longitude = sensorNames[sensor.id].longitude;
                        } else {
                            // Use default coordinates for unknown sensors
                            latitude = 0;
                            longitude = 0;
                        }

                        // Get noise level based on current metric
                        const lmaxValue = sensor.Lmax || sensor.loudness || 0;
                        const leqValue = sensor.Leq || 0;

                        // Check if data is older than 24 hours
                        const isDataOld = (currentTimestamp - sensor.timestamp) > oneDayInSeconds;

                        // Create Lmax circle first (so it's underneath)
                        const lmaxColor = isDataOld ? '#888888' : getColor(lmaxValue);
                        const lmaxCircle = L.circleMarker([latitude, longitude], {
                            color: '#000000', // Black border
                            fillColor: lmaxColor,
                            fillOpacity: 1.0,
                            weight: 0.5, // Very thin black border
                            radius: getRadius(lmaxValue)
                        }).addTo(map);

                        // Create Leq circle second (so it's on top)
                        const leqColor = isDataOld ? '#888888' : getColor(leqValue);
                        const leqCircle = L.circleMarker([latitude, longitude], {
                            color: '#000000', // Black border
                            fillColor: leqColor,
                            fillOpacity: 1.0,
                            weight: 0.5, // Very thin black border
                            radius: getRadius(leqValue)
                        }).addTo(map);

                        // Add text label for Leq (above the circles)
                        const leqLabelOffset = Math.max(getRadius(leqValue), getRadius(lmaxValue)) + 10; // Much higher above
                        const leqTextLabel = L.divIcon({
                            html: `<div style="text-align: center; font-weight: bold; color: #333; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">${Math.round(leqValue)} dB Leq</div>`,
                            className: 'noise-label',
                            iconSize: [80, 20],
                            iconAnchor: [40, leqLabelOffset] // Positive value to position above
                        });

                        const leqTextMarker = L.marker([latitude, longitude], {
                            icon: leqTextLabel,
                            interactive: false
                        }).addTo(map);

                        // Add text label for Lmax (below the circles)
                        const lmaxLabelOffset = -Math.max(getRadius(leqValue), getRadius(lmaxValue)) / 2 - 5; // Below the circles
                        const lmaxTextLabel = L.divIcon({
                            html: `<div style="text-align: center; font-weight: bold; color: #333; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;">${Math.round(lmaxValue)} dB Lmax</div>`,
                            className: 'noise-label',
                            iconSize: [80, 20],
                            iconAnchor: [40, lmaxLabelOffset]
                        });

                        const lmaxTextMarker = L.marker([latitude, longitude], {
                            icon: lmaxTextLabel,
                            interactive: false
                        }).addTo(map);

                        // Store references to all markers
                        sensorMarkers.push(leqCircle, lmaxCircle, leqTextMarker, lmaxTextMarker);

                        // Create unique ID for the combined chart canvas
                        const chartId = `chart-${sensor.id.replace(/[^a-zA-Z0-9]/g, '-')}`;

                        // Add popup with sensor info and charts
                        const timestamp = sensor.timestamp ?
                            new Date(sensor.timestamp * 1000).toLocaleString('pl-PL', {
                                day: '2-digit',
                                month: '2-digit',
                                year: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit',
                                second: '2-digit'
                            }).replace(/\./g, '-') :
                            'Nieznany';

                        // Add information about data freshness to popup
                        const dataAgeInfo = isDataOld ?
                            '<p style="color: #888;"><strong>Uwaga:</strong> Dane starsze niż 24 godziny</p>' :
                            '';

                        const popupContent = `
                            <h3>${sensorNames[sensor.id] ? sensorNames[sensor.id].adres : sensor.id}</h3>
                            <p> <strong>Lmax:</strong> <span style="font-weight: 700; font-size: 1.3em;">${lmaxValue} dB</span>, <strong>Leq:</strong> <span style="font-weight: 700; font-size: 1.3em;">${leqValue} dB</span></p>
                            <p><strong>Ostatni pomiar:</strong> ${timestamp}</p>
                            ${dataAgeInfo}
                            <div style="margin-top: 15px;">
                                <h4 style="margin: 0 0 10px 0; text-align: center;">Poziomy hałasu w ostatnich 24 godzinach</h4>
                                <div class="popup-chart-container" style="width: 300px; height: 200px;">
                                    <canvas id="${chartId}"></canvas>
                                </div>
                            </div>
                        `;

                        // Add popup to both circles
                        leqCircle.bindPopup(popupContent);
                        lmaxCircle.bindPopup(popupContent);

                        // Create charts when popup is opened (for both circles)
                        leqCircle.on('popupopen', function () {
                            setTimeout(() => {
                                createCombinedNoiseChart(sensor.id, chartId);
                            }, 10);
                        });

                        lmaxCircle.on('popupopen', function () {
                            setTimeout(() => {
                                createCombinedNoiseChart(sensor.id, chartId);
                            }, 10);
                        });

                        // Create sensor props objects for the info panel
                        const sensorProps = {
                            id: sensor.id,
                            Lmax: lmaxValue,
                            Leq: leqValue,
                            timestamp: sensor.timestamp || 0
                        };

                        // When circles are clicked, update the info panel with this sensor's info
                        leqCircle.on('click', function () {
                            info.update(sensorProps);
                        });

                        lmaxCircle.on('click', function () {
                            info.update(sensorProps);
                        });


                    });
                })
                .catch(error => {
                    console.error('There was a problem fetching the sensor data:', error);
                    document.getElementById('loading').style.display = 'none';
                    alert('Wystąpił problem podczas ładowania danych.');
                });
        }

        // Initial data load
        fetchData();

        // Function to refresh data
        function refreshData() {
            // Show loading indicator
            document.getElementById('loading').style.display = 'block';

            // Clear existing markers from map and stored references
            sensorMarkers.forEach(marker => map.removeLayer(marker));
            sensorMarkers = [];

            // Fetch fresh data
            fetchData();
        }

        // Set up automatic refresh every 3 minutes (180000 milliseconds)
        const refreshInterval = 180000; // 3 minutes
        setInterval(refreshData, refreshInterval);

    </script>
</body>

</html>
